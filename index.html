<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JH'S 웹 포털</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="portal">
    <section class="hero" aria-labelledby="portal-title">
      <div class="hero__content">
        <p class="eyebrow">Happy Learning Compass</p>
        <h1 id="portal-title">JH'S 웹 포털</h1>
        <p class="hero__text">선생님의 수업 여정을 함께하는 디지털 나침반입니다.</p>
      </div>

      <div class="compass-illustration" aria-label="나침반 일러스트">
        <span class="spark spark--yellow" aria-hidden="true"></span>
        <span class="spark spark--pink" aria-hidden="true"></span>
        <span class="spark spark--green" aria-hidden="true"></span>
        <img class="compass-image" src="assets/compass.png" alt="웃는 얼굴의 파란 나침반 일러스트">
      </div>
    </section>

    <section class="apps" aria-label="웹앱 바로가기">
      <a class="app-button app-button--screen" href="https://screen-lemon.vercel.app/" aria-label="JH'S 스크린 웹앱으로 이동">
        <span class="app-button__icon app-button__icon--image">
          <img src="assets/screen-character.png" alt="" aria-hidden="true">
        </span>
        <span class="app-button__text">
          <strong>JH'S 스크린</strong>
          <small>화면 활용 도구</small>
        </span>
      </a>

      <a class="app-button app-button--master" href="https://concept-kappa-khaki.vercel.app/" aria-label="초등 개념어 마스터 웹앱으로 이동">
        <span class="app-button__icon app-button__icon--image app-button__icon--book">
          <img src="assets/concept-character.png" alt="" aria-hidden="true">
        </span>
        <span class="app-button__text">
          <strong>초등 개념어 마스터</strong>
          <small>개념어 학습 도구</small>
        </span>
      </a>
    </section>
  </main>
</body>
</html>
